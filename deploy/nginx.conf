# Evening Learning — Nginx config
# Replace DOMAIN_NAME with your actual domain before using
# Copy to: /etc/nginx/sites-available/evening-learning

server {
    listen 80;
    server_name DOMAIN_NAME;

    # Frontend static files (React build output)
    root /opt/evening-learning/frontend/dist;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # API + webhook proxy → FastAPI
    location ~ ^/(api|webhook|health) {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # React SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block dotfiles
    location ~ /\. {
        deny all;
    }
}

# HTTPS block added automatically by certbot after: sudo certbot --nginx -d DOMAIN_NAME
