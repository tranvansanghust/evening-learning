services:
  mysql:
    image: mysql:8.0
    restart: always
    env_file: ./backend/.env
    environment:
      MYSQL_DATABASE: ${DB_NAME:-evening_learning}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  api:
    build: ./backend
    restart: always
    env_file: ./backend/.env
    environment:
      DB_HOST: mysql
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./lessons:/lessons:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"

  bot:
    build: ./backend
    command: ["python", "-m", "app.bot_polling"]
    restart: always
    env_file: ./backend/.env
    environment:
      DB_HOST: mysql
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./lessons:/lessons:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: deploy/Dockerfile.nginx
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  mysql_data:
  redis_data:
